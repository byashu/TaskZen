{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskZen | Productivity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; }
        .bg-purple { background-color: #6f42c1 !important; }
        .stat-card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress { height: 25px; border-radius: 50px; background-color: #e9ecef; }
        .progress-bar { background-color: #6f42c1; font-weight: bold; border-radius: 50px; }
        .chart-box { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-purple mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'taskboard' %}">← Back to Taskboard</a>
            <span class="navbar-text text-white">Productivity Dashboard</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4 mb-5 text-center">
            <div class="col-md-3"><div class="card stat-card p-3 border-top border-primary border-5"><small class="text-muted fw-bold">TOTAL</small><h2 class="fw-bold mt-2">{{ total }}</h2></div></div>
            <div class="col-md-3"><div class="card stat-card p-3 border-top border-danger border-5"><small class="text-muted fw-bold">HIGH</small><h2 class="fw-bold mt-2">{{ high }}</h2></div></div>
            <div class="col-md-3"><div class="card stat-card p-3 border-top border-success border-5"><small class="text-muted fw-bold">COMPLETED</small><h2 class="fw-bold mt-2">{{ completed }}</h2></div></div>
            <div class="col-md-3"><div class="card stat-card p-3 border-top border-warning border-5"><small class="text-muted fw-bold">PENDING</small><h2 class="fw-bold mt-2">{{ pending }}</h2></div></div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="chart-box text-center" 
                     id="chart-data-container" 
                     data-high="{{ high }}" 
                     data-medium="{{ medium }}" 
                     data-low="{{ low }}">
                    <h4 class="mb-4 fw-bold text-dark">Priority Distribution</h4>
                    <canvas id="priorityChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/productivity.js' %}"></script>
</body>
</html>
