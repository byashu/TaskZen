{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Create Account</title>
    <link rel="icon" type="image/png" href="{% static 'images/taskzenICON.jpg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/authentication.css' %}">
</head>

<body class="dashboard-main">
    <header class="sticky-top navbar navbar-dark bg-purple px-4 shadow-sm">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'images/LOGOwhite.png' %}" height="40" class="me-2">
            <span class="fw-bold">TaskZen</span>
        </a>
    </header>

    <main class="d-flex justify-content-center align-items-center flex-grow-1 py-5">
        <div class="auth-container shadow-lg">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Join TaskZen</h2>
                <p class="subtitle">Start organizing your life with ease.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning py-2 small d-flex align-items-center">
                        <i class="fas fa-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                
                <div class="form-group mb-3">
                    <label class="form-label"><i class="fas fa-user me-1"></i> Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a unique username" required>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label"><i class="fas fa-envelope me-1"></i> Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                </div>

                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label class="form-label"><i class="fas fa-key me-1"></i> Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="col-md-6 form-group mb-4">
                        <label class="form-label"><i class="fas fa-check-double me-1"></i> Confirm</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="auth-btn">
                    <span>Create Account</span> <i class="fas fa-rocket ms-2"></i>
                </button>

                <p class="switch mt-4">
                    Already a member? <a href="{% url 'login' %}">Sign In instead</a>
                </p>
            </form>
        </div>
    </main>

    <footer class="foot">
        <p class="mb-0">© 2026 TaskZen | Empowering your daily workflow</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
