{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Edit Task</title>
    <link rel="icon" type="image/png" href="{% static 'images/taskzenICON.jpg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/addedit.css' %}">
</head>

<body class="dashboard-main">
    <header class="sticky-top navbar navbar-dark bg-purple px-4 shadow-sm">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'taskboard' %}">
            <img src="{% static 'images/LOGOwhite.png' %}" height="40" class="me-2" alt="TaskZen Logo">
            <span class="fw-bold d-none d-sm-inline">TaskZen</span>
        </a>
        <div class="text-white small d-none d-md-block">
            Editing Task: <strong>{{ task.title|truncatechars:20 }}</strong>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="form-card shadow-lg p-4 p-md-5 bg-white">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark">Modify Task</h2>
                        <p class="text-muted small">Update your task details below to stay on track.</p>
                    </div>

                    <form action="{% url 'edit_task' task.id %}" method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_title" class="form-label">Task Title</label>
                            <input type="text" name="title" id="id_title" value="{{ task.title }}" 
                                   class="form-control form-control-lg" placeholder="e.g., Complete Django Project" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_desc" class="form-label">Detailed Description</label>
                            <textarea name="description" id="id_desc" class="form-control" 
                                      rows="4" placeholder="Describe the steps or goals...">{{ task.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="priority" class="form-label">Priority Level</label>
                                <select id="priority" name="priority" class="form-select" required>
                                    <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>🟢 Low Priority</option>
                                    <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>🟠 Medium Priority</option>
                                    <option value="High" {% if task.priority == 'High' %}selected{% endif %}>🔴 High Priority</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label for="due" class="form-label">Deadline</label>
                                <input type="date" id="due" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}" 
                                       class="form-control" required>
                            </div>
                        </div>

                        <hr class="my-4 opacity-25">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'taskboard' %}" class="btn btn-light px-4 border text-muted">Cancel</a>
                            <button type="submit" class="btn btn-update px-5 shadow-sm">Save Changes</button>
                        </div>
                    </form>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{% url 'task_detail' task.id %}" class="text-decoration-none small text-purple fw-bold">
                        ← Back to Task View
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top mt-5 py-3 text-center">
        <p class="mb-1 text-muted small">TaskZen | Built for Productivity</p>
        <p class="small text-secondary mb-0">© 2026 iTprenure Students Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
