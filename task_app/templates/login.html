{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Welcome Back</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/authentication.css' %}">
</head>

<body class="dashboard-main">
    <header class="sticky-top navbar navbar-dark bg-purple px-4 shadow-sm">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" height="40" class="me-2">
            <span class="fw-bold">TaskZen</span>
        </a>
    </header>

    <main class="d-flex justify-content-center align-items-center flex-grow-1">
        <div class="auth-container shadow-lg">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Welcome Back!</h2>
                <p class="subtitle">Please enter your details to stay productive.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small d-flex align-items-center">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="form-group mb-3">
                    <label class="form-label"><i class="fas fa-user-circle me-1"></i> Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                        <span class="position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer" id="togglePassword" style="cursor: pointer;">
                            <i class="fas fa-eye text-muted" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="auth-btn">
                    <span>Sign In</span> <i class="fas fa-arrow-right ms-2"></i>
                </button>

                <p class="switch mt-4">
                    New to TaskZen? <a href="{% url 'register' %}">Create an account</a>
                </p>
            </form>
        </div>
    </main>

    <footer class="foot">
        <p class="mb-0">© 2026 TaskZen | Designed for Efficiency</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordInput');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye icon
            eyeIcon.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
